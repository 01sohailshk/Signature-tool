<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Tool v1.0</title>
    
    <link class="rounded-full" rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%236366f1'%3E%3Cpath d='M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z'/%3E%3C/svg%3E">

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #0f172a !important; color: #e2e8f0 !important; }
        .card-bg { background-color: #1e293b !important; }
        .inner-bg { background-color: #0f172a !important; }
        .preview-container:not(.hidden) {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: 100% !important;
            height: 240px !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 antialiased">

    <div id="windowDragOverlay" class="fixed inset-0 bg-black bg-opacity-80 backdrop-blur-sm z-50 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-150 border-4 border-dashed border-indigo-500 m-4 rounded-2xl">
        <div class="text-center pointer-events-none">
            <p class="text-xl font-bold text-white">Drop Signature Anywhere</p>
        </div>
    </div>

    <div class="w-full max-w-xl card-bg rounded-2xl p-8 shadow-2xl border border-gray-800">
        
        <div class="mb-6 flex items-start justify-between">
            <div>
                <div class="flex items-center space-x-2">
                    <h1 class="text-2xl font-bold tracking-tight text-white">Signature Tool</h1>
                    <span class="text-[10px] font-semibold tracking-wider uppercase bg-indigo-500 bg-opacity-10 text-indigo-400 px-2 py-0.5 rounded border border-indigo-500 border-opacity-20 mt-0.5">V1 Tool</span>
                </div>
                <p class="text-sm text-gray-400 mt-1">Dual-Pass Hybrid Orientation Analyzer</p>
            </div>
            <div class="flex items-center space-x-1.5 text-[11px] text-green-400 font-medium bg-green-500 bg-opacity-5 px-2.5 py-1 rounded-full border border-green-500 border-opacity-10 shrink-0">
                <span>Local Secure</span>
            </div>
        </div>

        <div id="dropZone" class="relative group inner-bg border border-dashed border-gray-700 rounded-xl p-4 flex flex-col items-center justify-center min-h-[260px] cursor-pointer overflow-hidden">
            
            <div id="canvasToolbar" class="absolute top-4 right-4 flex space-x-1.5 hidden z-20">
                <button id="rotateBtn" type="button" class="p-2 rounded-lg border border-gray-700 bg-gray-800 text-gray-300 font-medium text-xs shadow-md hover:bg-gray-700 transition-colors">Rotate 90°</button>
                <button id="clearBtn" type="button" class="p-2 rounded-lg border border-red-950 bg-red-900 bg-opacity-40 text-red-300 font-medium text-xs shadow-md hover:bg-opacity-60 transition-colors">Clear</button>
            </div>

            <input type="file" id="fileInput" accept="image/*" class="hidden">
            
            <div id="placeholderText" class="text-center space-y-2 pointer-events-none">
                <p class="text-sm font-medium text-gray-400">Click to upload, tap box, or press <span class="text-indigo-400">Ctrl + V</span> to paste</p>
                <p class="text-xs text-gray-500">Intelligent auto-orientation for continuous cursive signatures</p>
            </div>

            <div id="previewBox" class="preview-container hidden rounded-lg p-1.5 bg-white shadow-xl">
                <img id="previewImage" class="max-w-full max-h-[220px] object-contain rounded mx-auto" alt="Processed Signature Output">
            </div>
        </div>

        <div class="mt-4 grid grid-cols-3 gap-2 bg-black bg-opacity-20 border border-gray-800 rounded-xl p-3.5 text-center text-xs">
            <div><span class="text-gray-400">Original:</span> <span id="origSize" class="text-gray-300 ml-1 font-semibold">-</span></div>
            <div><span class="text-gray-400">Optimized:</span> <span id="optSize" class="text-green-400 ml-1 font-semibold">-</span></div>
            <div><span class="text-gray-400">Quality:</span> <span id="qualityPerc" class="text-indigo-400 ml-1 font-semibold">-</span></div>
        </div>

        <button id="downloadBtn" type="button" disabled class="mt-5 w-full bg-white text-gray-900 disabled:bg-gray-700 disabled:text-gray-400 font-semibold py-3.5 px-4 rounded-xl shadow-lg transition-all cursor-not-allowed">
            Download Image (JPG)
        </button>
    </div>

    <canvas id="processingCanvas" class="hidden"></canvas>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewBox = document.getElementById('previewBox');
        const previewImage = document.getElementById('previewImage');
        const placeholderText = document.getElementById('placeholderText');
        const canvasToolbar = document.getElementById('canvasToolbar');
        const rotateBtn = document.getElementById('rotateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const windowDragOverlay = document.getElementById('windowDragOverlay');
        
        const origSizeEl = document.getElementById('origSize');
        const optSizeEl = document.getElementById('optSize');
        const qualityPercEl = document.getElementById('qualityPerc');
        const processingCanvas = document.getElementById('processingCanvas');

        let rawImageInstance = null;
        let finalOutputBlob = null;
        let manualRotationDegrees = 0; 
        let initialSizeKBs = 0;
        const targetOutputFormat = 'image/jpeg';

        // Global Drag Over Drag Enter Capture Window Listeners
        window.addEventListener('dragenter', (e) => { e.preventDefault(); windowDragOverlay.classList.remove('opacity-0'); });
        window.addEventListener('dragover', (e) => { e.preventDefault(); });
        windowDragOverlay.addEventListener('dragleave', () => { windowDragOverlay.classList.add('opacity-0'); });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            windowDragOverlay.classList.add('opacity-0');
            if (e.dataTransfer.files.length > 0) processFileEntry(e.dataTransfer.files[0]);
        });

        // Trigger Internal Select Interface Systems UI Dialog Hooks
        dropZone.addEventListener('click', () => { if(!rawImageInstance) fileInput.click(); });
        fileInput.addEventListener('change', (e) => processFileEntry(e.target.files[0]));

        // Native Clipboard OS Event Capture Listener Module Pipeline
        window.addEventListener('paste', (e) => {
            const clipboardItems = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of clipboardItems) {
                if (item.type.indexOf('image') === 0) {
                    processFileEntry(item.getAsFile());
                    return;
                }
            }
        });

        // Manual Interaction Control Interfaces Event Triggers
        rotateBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            manualRotationDegrees = (manualRotationDegrees + 90) % 360;
            applySignatureTransformation(false);
        });

        clearBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resetToolState();
        });

        function resetToolState() {
            rawImageInstance = null;
            finalOutputBlob = null;
            manualRotationDegrees = 0;
            fileInput.value = '';
            previewImage.src = '';
            previewBox.classList.add('hidden');
            canvasToolbar.classList.add('hidden');
            placeholderText.classList.remove('hidden');
            origSizeEl.textContent = '-';
            optSizeEl.textContent = '-';
            qualityPercEl.textContent = '-';
            downloadBtn.disabled = true;
            downloadBtn.classList.add('cursor-not-allowed', 'bg-gray-700', 'text-gray-400');
            downloadBtn.classList.remove('bg-white', 'text-gray-900');
        }

        function processFileEntry(file) {
            if (!file || !file.type.match('image.*')) return;
            initialSizeKBs = (file.size / 1024).toFixed(1);
            const reader = new FileReader();
            reader.onload = (e) => prepareImageObject(e.target.result);
            reader.readAsDataURL(file);
        }

        function prepareImageObject(src) {
            rawImageInstance = new Image();
            rawImageInstance.onload = () => {
                canvasToolbar.classList.remove('hidden');
                placeholderText.classList.add('hidden');
                previewBox.classList.remove('hidden');
                manualRotationDegrees = 0; 
                applySignatureTransformation(true); 
            };
            rawImageInstance.src = src;
        }

        // Structural Orientation Auto-Layout Analyzer Engine Module
        function calculateLayoutSymmetricMatrix(ctx, w, h) {
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;
            let rowProfiles = new Array(h).fill(0);
            let colProfiles = new Array(w).fill(0);

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    let idx = (y * w + x) * 4;
                    let brightness = (data[idx] + data[idx+1] + data[idx+2]) / 3;
                    if (data[idx+3] > 40 && brightness < 200) {
                        rowProfiles[y]++;
                        colProfiles[x]++;
                    }
                }
            }
            const getVariance = (arr) => {
                const active = arr.filter(v => v > 0);
                if (active.length === 0) return 0;
                const mean = active.reduce((a, b) => a + b, 0) / active.length;
                return arr.reduce((s, v) => s + Math.pow(v - mean, 2), 0) / arr.length;
            };
            return getVariance(rowProfiles) / (getVariance(colProfiles) + 1);
        }

        // Main Image Normalization, Contrast Isolate, Auto Crop & Quality Compression Module Engine Pipeline
        async function applySignatureTransformation(enableAutoOrientation = false) {
            if (!rawImageInstance) return;

            const ctx = processingCanvas.getContext('2d', { willReadFrequently: true });
            const nativeW = rawImageInstance.naturalWidth;
            const nativeH = rawImageInstance.naturalHeight;

            let targetRotation = manualRotationDegrees;
            
            if (enableAutoOrientation) {
                let scores = {};
                for (let angle of [0, 90, 180, 270]) {
                    if (angle === 90 || angle === 270) {
                        processingCanvas.width = nativeH; processingCanvas.height = nativeW;
                    } else {
                        processingCanvas.width = nativeW; processingCanvas.height = nativeH;
                    }
                    ctx.clearRect(0, 0, processingCanvas.width, processingCanvas.height);
                    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, processingCanvas.width, processingCanvas.height);
                    ctx.translate(processingCanvas.width / 2, processingCanvas.height / 2);
                    ctx.rotate((angle * Math.PI) / 180);
                    ctx.drawImage(rawImageInstance, -nativeW / 2, -nativeH / 2);
                    ctx.setTransform(1, 0, 0, 1, 0, 0);
                    scores[angle] = calculateLayoutSymmetricMatrix(ctx, processingCanvas.width, processingCanvas.height);
                }
                let optimumAngle = 0;
                let highestScore = scores[0];
                for (let angle of [90, 180, 270]) {
                    if (scores[angle] > highestScore) { highestScore = scores[angle]; optimumAngle = angle; }
                }
                targetRotation = optimumAngle;
                manualRotationDegrees = optimumAngle;
            }

            if (targetRotation === 90 || targetRotation === 270) {
                processingCanvas.width = nativeH; processingCanvas.height = nativeW;
            } else {
                processingCanvas.width = nativeW; processingCanvas.height = nativeH;
            }

            ctx.clearRect(0, 0, processingCanvas.width, processingCanvas.height);
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, processingCanvas.width, processingCanvas.height);
            ctx.translate(processingCanvas.width / 2, processingCanvas.height / 2);
            ctx.rotate((targetRotation * Math.PI) / 180);
            ctx.drawImage(rawImageInstance, -nativeW / 2, -nativeH / 2);
            ctx.setTransform(1, 0, 0, 1, 0, 0); 

            let imgData = ctx.getImageData(0, 0, processingCanvas.width, processingCanvas.height);
            const pixels = imgData.data;
            const w = processingCanvas.width;
            const h = processingCanvas.height;

            let minX = w, maxX = 0, minY = h, maxY = 0;
            let inkDetected = false;

            const monoMap = new Uint8Array(w * h);
            for (let i = 0; i < pixels.length; i += 4) {
                monoMap[i / 4] = Math.floor(pixels[i] * 0.299 + pixels[i + 1] * 0.587 + pixels[i + 2] * 0.114);
            }

            const kernelRadius = 8; 
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = (y * w + x) * 4;
                    const monoIdx = y * w + x;
                    const leftVal = x > kernelRadius ? monoMap[monoIdx - kernelRadius] : monoMap[monoIdx];
                    const rightVal = x < w - kernelRadius ? monoMap[monoIdx + kernelRadius] : monoMap[monoIdx];
                    const localBackgroundAverage = (leftVal + rightVal) / 2;
                    const currentPixelLuminosity = monoMap[monoIdx];
                    const diff = localBackgroundAverage - currentPixelLuminosity;
                    
                    if (diff > 7 && currentPixelLuminosity < 242) {
                        pixels[idx] = currentPixelLuminosity; pixels[idx + 1] = currentPixelLuminosity; pixels[idx + 2] = currentPixelLuminosity; pixels[idx + 3] = 255;
                        if (x < minX) minX = x; if (x > maxX) maxX = x;
                        if (y < minY) minY = y; if (y > maxY) maxY = y;
                        inkDetected = true;
                    } else {
                        pixels[idx] = 255; pixels[idx + 1] = 255; pixels[idx + 2] = 255; pixels[idx + 3] = 255;
                    }
                }
            }
            ctx.putImageData(imgData, 0, 0);

            if (!inkDetected || minX >= maxX || minY >= maxY) { minX = 0; minY = 0; maxX = w; maxY = h; }

            const padding = 25;
            minX = Math.max(0, minX - padding); minY = Math.max(0, minY - padding);
            maxX = Math.min(w, maxX + padding); maxY = Math.min(h, maxY + padding);

            let cropW = maxX - minX; let cropH = maxY - minY;
            const cropCanvas = document.createElement('canvas');
            cropCanvas.width = cropW; cropCanvas.height = cropH;
            const cropCtx = cropCanvas.getContext('2d');
            cropCtx.drawImage(processingCanvas, minX, minY, cropW, cropH, 0, 0, cropW, cropH);

            // Dynamic Binary Adaptive Quality Compressor Array to Force Exact 18KB Constraints
            const MAX_BYTES = 18 * 1024; 
            let quality = 0.85;
            finalOutputBlob = await new Promise(res => cropCanvas.toBlob(res, targetOutputFormat, quality));
            
            while (finalOutputBlob.size > MAX_BYTES && quality > 0.15) {
                quality -= 0.08; 
                finalOutputBlob = await new Promise(res => cropCanvas.toBlob(res, targetOutputFormat, quality));
            }

            previewImage.src = URL.createObjectURL(finalOutputBlob);
            origSizeEl.textContent = `${initialSizeKBs} KB`;
            optSizeEl.textContent = `${(finalOutputBlob.size / 1024).toFixed(1)} KB`;
            qualityPercEl.textContent = `${Math.round(quality * 100)}%`;

            downloadBtn.disabled = false;
            downloadBtn.classList.remove('cursor-not-allowed', 'bg-gray-700', 'text-gray-400');
            downloadBtn.classList.add('bg-white', 'text-gray-900', 'hover:bg-gray-100');
        }

        downloadBtn.addEventListener('click', () => {
            if (!finalOutputBlob) return;
            const downloadLink = document.createElement('a');
            downloadLink.href = URL.createObjectURL(finalOutputBlob);
            downloadLink.download = `signature.jpg`;
            downloadLink.click();
        });
    </script>
</body>
</html>
